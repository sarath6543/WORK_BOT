name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect root Node project
        id: root_node_project
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect document collection form project
        id: document_form_project
        shell: bash
        run: |
          if [ -f document-collection-form/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.root_node_project.outputs.exists == 'true' || steps.document_form_project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        if: steps.root_node_project.outputs.exists == 'true'
        run: npm ci

      - name: Lint root project
        if: steps.root_node_project.outputs.exists == 'true'
        run: npm run lint --if-present

      - name: Test root project
        if: steps.root_node_project.outputs.exists == 'true'
        run: npm test --if-present

      - name: Build root project
        if: steps.root_node_project.outputs.exists == 'true'
        run: npm run build --if-present

      - name: Security audit root project
        if: steps.root_node_project.outputs.exists == 'true'
        run: npm audit --audit-level=high

      - name: Install document collection form dependencies
        if: steps.document_form_project.outputs.exists == 'true'
        working-directory: document-collection-form
        run: npm ci

      - name: Lint document collection form
        if: steps.document_form_project.outputs.exists == 'true'
        working-directory: document-collection-form
        run: npm run lint

      - name: Test document collection form
        if: steps.document_form_project.outputs.exists == 'true'
        working-directory: document-collection-form
        run: npm test

      - name: Build document collection form
        if: steps.document_form_project.outputs.exists == 'true'
        working-directory: document-collection-form
        run: npm run build

      - name: Security audit document collection form
        if: steps.document_form_project.outputs.exists == 'true'
        working-directory: document-collection-form
        run: npm audit --audit-level=high

      - name: No project detected
        if: steps.root_node_project.outputs.exists != 'true' && steps.document_form_project.outputs.exists != 'true'
        run: echo "No package.json found. Add project-specific CI steps when the app is created."

  notify-n8n:
    runs-on: ubuntu-latest
    needs:
      - checks
    if: always()
    env:
      N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}

    steps:
      - name: Notify n8n
        if: env.N8N_WEBHOOK_URL != ''
        continue-on-error: true
        shell: bash
        env:
          CI_RESULT: ${{ needs.checks.result }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          WORKFLOW: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          curl -sS --max-time 20 --retry 2 -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"repository\": \"$REPOSITORY\",
              \"branch\": \"$REF_NAME\",
              \"commit\": \"$SHA\",
              \"actor\": \"$ACTOR\",
              \"status\": \"$CI_RESULT\",
              \"workflow\": \"$WORKFLOW\",
              \"event\": \"$EVENT_NAME\",
              \"run_url\": \"https://github.com/$REPOSITORY/actions/runs/$RUN_ID\"
            }"
